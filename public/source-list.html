<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NHI Archive Source List</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a1420;
        --panel: #102033;
        --panel-2: #0f1d2f;
        --text: #e1ebf7;
        --muted: #9db3cd;
        --border: #34506f;
        --accent: #4fa8ff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, Manrope, 'Segoe UI', sans-serif;
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
      }
      p {
        margin: 0;
        color: var(--muted);
      }
      .meta {
        margin-top: 8px;
        font-size: 0.88rem;
      }
      .panel {
        margin-top: 14px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: var(--panel-2);
        overflow: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        min-width: 980px;
      }
      thead th {
        text-align: left;
        background: var(--panel);
        color: #b9d5f2;
        font-weight: 600;
        font-size: 0.82rem;
        letter-spacing: 0.02em;
      }
      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid rgba(76, 110, 146, 0.45);
        font-size: 0.84rem;
        vertical-align: top;
      }
      tbody tr:hover {
        background: rgba(79, 168, 255, 0.08);
      }
      a {
        color: var(--accent);
        text-decoration: none;
      }
      a:hover {
        text-decoration: underline;
      }
      .chip {
        display: inline-block;
        border: 1px solid rgba(101, 138, 177, 0.65);
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 0.74rem;
        color: #c8ddf3;
        background: rgba(17, 33, 52, 0.82);
      }
      .error {
        margin-top: 14px;
        padding: 10px 12px;
        border: 1px solid #8d4040;
        border-radius: 10px;
        background: rgba(121, 48, 48, 0.2);
        color: #ffd6d6;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>NHI Archive Source List</h1>
      <p>Registry and ingest statistics used to build the public graph dataset.</p>
      <p id="meta" class="meta">Loading source catalog...</p>
      <div class="panel">
        <table aria-label="source catalog table">
          <thead>
            <tr>
              <th>Source</th>
              <th>Type</th>
              <th>Trust</th>
              <th>Frequency</th>
              <th>Method</th>
              <th>Processed</th>
              <th>Auto Ingested</th>
              <th>Review Queue</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
      <div id="error"></div>
    </div>

    <script>
      const rowsEl = document.getElementById('rows');
      const metaEl = document.getElementById('meta');
      const errorEl = document.getElementById('error');

      function cell(content) {
        const td = document.createElement('td');
        td.append(content);
        return td;
      }

      fetch('./data/source-list.json', { cache: 'no-store' })
        .then((response) => {
          if (!response.ok) {
            throw new Error('Source list load failed: ' + response.status);
          }
          return response.json();
        })
        .then((payload) => {
          const generated = new Date(payload.generated_at || Date.now()).toLocaleString();
          metaEl.textContent = `Generated: ${generated} • Sources: ${payload.total_sources ?? payload.sources?.length ?? 0}`;

          const sources = Array.isArray(payload.sources) ? payload.sources : [];
          for (const source of sources) {
            const tr = document.createElement('tr');

            const sourceCell = document.createElement('td');
            const link = document.createElement('a');
            link.href = source.url;
            link.textContent = source.name || source.source_id;
            link.target = '_blank';
            link.rel = 'noreferrer noopener';
            sourceCell.append(link);
            const idChip = document.createElement('div');
            idChip.className = 'chip';
            idChip.textContent = source.source_id;
            idChip.style.marginTop = '6px';
            sourceCell.append(idChip);

            tr.append(
              sourceCell,
              cell(document.createTextNode(source.source_type || '')),
              cell(document.createTextNode(source.trust_level || '')),
              cell(document.createTextNode(source.crawl_frequency || '')),
              cell(document.createTextNode(source.extraction_method || '')),
              cell(document.createTextNode(String(source.records_processed ?? 0))),
              cell(document.createTextNode(String(source.records_auto_ingested ?? 0))),
              cell(document.createTextNode(String(source.records_review_queue ?? 0)))
            );

            rowsEl.append(tr);
          }
        })
        .catch((error) => {
          errorEl.className = 'error';
          errorEl.textContent = error.message;
          metaEl.textContent = 'Unable to load source catalog.';
        });
    </script>
  </body>
</html>
